<!DOCTYPE html>
<html lang="en">
<head>
<style>
  h1:has(> a[href="https://weijiajin.com/"]) {
    display: none;
  }
  img.hr-image {
    width: 100%;
    height: auto;
  }
  .icon {
    width: 24px;
    height: 24px;
    transition: transform 0.2s ease; /* 添加过渡效果 */
  }

  .icon:hover {
    transform: scale(1.1); /* 鼠标悬停时放大图像 */
  }
  .flex-container {
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column; /* 使子元素垂直排列 */
  }
  
  a {
  display: inline-block; /* 使<a>标签的大小适应内部内容 */
  }
  img {
  display: block; /* 避免图片下方的空隙 */
  margin: 0; /* 确保没有外边距影响尺寸 */
  }
  .outer-div {
    position: relative;
  }
  .inner-a {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
  }


</style>

<link rel="icon" type="image/x-icon" href="/favicon.ico">
<script src="https://sdk.jinrishici.com/v2/browser/jinrishici.js" charset="utf-8"></script>
</head>

</body>
</html>
