<!DOCTYPE html>
<html lang="en">
<head>
<style>
  h1:has(> a[href="https://weijiajin.com/"]) {
    display: none;
  }
  img.hr-image {
    width: 100%;
    height: auto;
  }
  .icon {
    transition: transform 0.3s ease; /* 添加过渡效果 */
  }
  .icon:hover {
    transform: scale(1.3); /* 鼠标悬停时放大图像 */
  }
  .blog-icon {
    transition: transform 0.3s ease; /* 添加过渡效果 */
  }
  .blog-icon:hover {
    transform: scale(1.1); /* 鼠标悬停时放大图像 */
  }

  .flex-container {
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column; /* 使子元素垂直排列 */
  align-items: center;
  }
  .my-span-icon {
    display: inline-block; /* 让 span 元素根据子元素高度自动调整 */
    height: 24px;
  }
  .my-span-icon a {
    margin-right: 1em; /* 设置元素之间的间距为一个空格大小 */
  }
  .my-span-icon a:last-child {
    margin-right: 0; /* 最后一个 <a> 元素不设置右边距 */
  }
  .my-span-foot {
    display: inline-block; /* 让 span 元素根据子元素高度自动调整 */
    height: 20px;
  }
  .my-span-foot a {
    margin-right: 1em; /* 设置元素之间的间距为一个空格大小 */
  }
  .my-span-foot a:last-child {
    margin-right: 0; /* 最后一个 <a> 元素不设置右边距 */
  }
  .span-blog {
    display: inline-block; /* 让 span 元素根据子元素高度自动调整 */
    height: 28px;
  }

  a {
  display: inline-block; /* 使<a>标签的大小适应内部内容 */
  margin: 0; 
  }
  img {
  display: block; /* 避免图片下方的空隙 */
  margin: 0; /* 确保没有外边距影响尺寸 */
  }
  .div-blog {
    display: flex;
    flex-wrap: wrap; /* 允许图片换行 */
    justify-content: center;
    align-items: center;
    }
  
  .div-blog span {
    display: flex;
    justify-content: center;
    align-items: center;
    margin-bottom: 16px;
    margin-right: 16px; 
  }
  .div-blog .row span:last-child {
    margin-right: 0; /* 最后一个 <a> 元素不设置右边距 */
  }




</style>

<link rel="icon" type="image/x-icon" href="/favicon.ico">
<script src="https://sdk.jinrishici.com/v2/browser/jinrishici.js" charset="utf-8"></script>
<script>
  // 创建一个 script 元素
  var scriptElement = document.createElement('script');

  // 设置 script 元素的 src 属性为外部脚本地址
  scriptElement.src = "https://giscus.app/client.js";
  scriptElement.setAttribute('data-repo', 'wejudging/wejudging.github.io');
  scriptElement.setAttribute('data-repo-id', 'R_kgDOLk0dqQ');
  scriptElement.setAttribute('data-category', 'Announcements');
  scriptElement.setAttribute('data-category-id', 'DIC_kwDOLk0dqc4CeOLN');
  scriptElement.setAttribute('data-mapping', 'url');
  scriptElement.setAttribute('data-strict', '0');
  scriptElement.setAttribute('data-reactions-enabled', '1');
  scriptElement.setAttribute('data-emit-metadata', '0');
  scriptElement.setAttribute('data-input-position', 'top');
  scriptElement.setAttribute('data-theme', 'light');
  scriptElement.setAttribute('data-lang', 'zh-CN');
  scriptElement.setAttribute('data-loading', 'lazy');
  scriptElement.crossOrigin = 'anonymous';
  scriptElement.async = true;
  // 将 script 元素添加到 span 元素中
  document.getElementById('giscusContainer').appendChild(scriptElement);
</script>
</head>

</html>
